<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin 预测追踪系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .status {
            display: inline-block;
            padding: 8px 20px;
            background: #10b981;
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-weight: 600;
            color: #666;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }

        .signal {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .signal-grade {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .signal-direction {
            font-size: 1.5em;
            font-weight: bold;
        }

        .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .signal-detail {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 5px;
        }

        .trade-row {
            display: grid;
            grid-template-columns: 60px 100px 80px 100px 80px 80px 80px;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .trade-row:hover {
            background: #f8f9fa;
        }

        .trade-header {
            font-weight: bold;
            background: #667eea;
            color: white;
            border-radius: 5px;
        }

        .correct {
            color: #10b981;
            font-weight: bold;
        }

        .wrong {
            color: #ef4444;
            font-weight: bold;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .price-display {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }

        .update-time {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .no-signal {
            text-align: center;
            padding: 30px;
            background: #fef3c7;
            border-radius: 10px;
            color: #92400e;
            font-weight: 600;
        }

        .performance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .perf-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .perf-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .perf-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🪙 Bitcoin 预测追踪系统</h1>
            <div class="status">
                <span class="live-indicator"></span>
                <span id="statusText">系统运行中</span>
            </div>
            <div class="update-time" id="updateTime">最后更新: --</div>
        </div>

        <!-- 最新预测 -->
        <div class="card">
            <h2>📊 最新交易信号</h2>
            <div class="price-display" id="currentPrice">加载中...</div>
            <div id="latestSignals">
                <div class="loading">正在获取最新信号...</div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="refreshPrediction()">🔄 刷新预测</button>
            </div>
        </div>

        <!-- 性能统计 -->
        <div class="card">
            <h2>📈 系统性能</h2>
            <div id="performance" class="performance-grid">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 分层策略表现 -->
        <div class="card">
            <h2>🎯 分层策略表现</h2>
            <div id="tieredPerf">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 历史交易记录 -->
        <div class="card">
            <h2>📝 最近交易记录（70%基准）</h2>
            <div id="history">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 获取系统状态
        async function getStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                document.getElementById('statusText').textContent = data.message;
                document.getElementById('updateTime').textContent = `最后更新: ${data.last_update}`;
            } catch (error) {
                console.error('获取状态失败:', error);
            }
        }

        // 获取最新预测
        async function getLatestPrediction() {
            try {
                const response = await fetch('/api/latest_prediction');
                const data = await response.json();
                
                // 更新价格
                document.getElementById('currentPrice').textContent = 
                    `$${data.current_price.toLocaleString()} USD`;
                
                // 更新信号
                const signalsDiv = document.getElementById('latestSignals');
                if (data.signals && data.signals.length > 0) {
                    signalsDiv.innerHTML = data.signals.map(signal => `
                        <div class="signal">
                            <div class="signal-header">
                                <span class="signal-grade">${signal.grade}</span>
                                <span class="signal-direction">${signal.direction}</span>
                            </div>
                            <div class="signal-details">
                                <div class="signal-detail">
                                    <div>共识度</div>
                                    <div style="font-size: 1.2em; font-weight: bold;">${signal.consensus}</div>
                                </div>
                                <div class="signal-detail">
                                    <div>置信度</div>
                                    <div style="font-size: 1.2em; font-weight: bold;">${signal.confidence}%</div>
                                </div>
                                <div class="signal-detail">
                                    <div>建议仓位</div>
                                    <div style="font-size: 1.2em; font-weight: bold;">${signal.position_size}%</div>
                                </div>
                                <div class="signal-detail">
                                    <div>操作建议</div>
                                    <div style="font-size: 0.9em;">${signal.recommendation}</div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    signalsDiv.innerHTML = `
                        <div class="no-signal">
                            ⚠️ ${data.message || '当前无交易信号，建议观望'}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('获取预测失败:', error);
                document.getElementById('latestSignals').innerHTML = 
                    '<div class="loading">获取失败，请刷新重试</div>';
            }
        }

        // 获取性能统计
        async function getPerformance() {
            try {
                const response = await fetch('/api/performance');
                const data = await response.json();
                
                // 显示主要策略性能
                const perfDiv = document.getElementById('performance');
                perfDiv.innerHTML = data.strategies.map(strategy => `
                    <div class="perf-card">
                        <div class="perf-label">${strategy.name}</div>
                        <div class="perf-value">${strategy.accuracy}%</div>
                        <div class="perf-label">${strategy.trades}笔 | ${strategy.profit > 0 ? '+' : ''}${strategy.profit}%</div>
                    </div>
                `).join('');
                
                // 显示分层策略
                const tieredDiv = document.getElementById('tieredPerf');
                tieredDiv.innerHTML = `
                    <div class="trade-row trade-header">
                        <div>级别</div>
                        <div>交易次数</div>
                        <div>准确率</div>
                        <div>建议仓位</div>
                        <div>收益</div>
                    </div>
                    ${data.tiered.map(tier => `
                        <div class="trade-row">
                            <div style="font-weight: bold;">${tier.grade.split(' ')[0]}</div>
                            <div>${tier.trades}笔</div>
                            <div style="color: ${tier.accuracy >= 70 ? '#10b981' : '#ef4444'};">
                                ${tier.accuracy}%
                            </div>
                            <div>${tier.position}</div>
                            <div style="color: ${tier.profit >= 0 ? '#10b981' : '#ef4444'};">
                                ${tier.profit > 0 ? '+' : ''}${tier.profit}%
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (error) {
                console.error('获取性能失败:', error);
            }
        }

        // 获取历史记录
        async function getHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                const baseline = data['70%基准'];
                if (!baseline) return;
                
                const historyDiv = document.getElementById('history');
                historyDiv.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <div class="stat">
                            <span class="stat-label">总交易次数</span>
                            <span class="stat-value">${baseline.total_trades}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">准确率</span>
                            <span class="stat-value">${baseline.accuracy}%</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">总收益</span>
                            <span class="stat-value">${baseline.total_profit > 0 ? '+' : ''}${baseline.total_profit}%</span>
                        </div>
                    </div>
                    <div class="trade-row trade-header">
                        <div>周次</div>
                        <div>日期</div>
                        <div>预测</div>
                        <div>共识</div>
                        <div>置信度</div>
                        <div>结果</div>
                        <div>收益</div>
                    </div>
                    ${baseline.trades.reverse().map(trade => `
                        <div class="trade-row">
                            <div>W${trade.week}</div>
                            <div>${trade.date.substring(5, 10)}</div>
                            <div>${trade.direction}</div>
                            <div>${trade.consensus}</div>
                            <div>${trade.confidence}%</div>
                            <div class="${trade.result.includes('✓') ? 'correct' : 'wrong'}">
                                ${trade.result}
                            </div>
                            <div style="color: ${trade.pnl >= 0 ? '#10b981' : '#ef4444'};">
                                ${trade.pnl > 0 ? '+' : ''}${trade.pnl}%
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (error) {
                console.error('获取历史失败:', error);
            }
        }

        // 刷新预测
        function refreshPrediction() {
            getLatestPrediction();
            getStatus();
        }

        // 自动刷新
        function startAutoRefresh() {
            setInterval(() => {
                getStatus();
                getLatestPrediction();
            }, 60000); // 每分钟刷新一次
        }

        // 初始化
        window.onload = function() {
            getStatus();
            getLatestPrediction();
            getPerformance();
            getHistory();
            startAutoRefresh();
        };
    </script>
</body>
</html>
